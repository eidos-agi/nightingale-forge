incident_id: INC-{{NUMBER}}
date: {{DATE}}
session_id: {{SESSION_ID}}
severity: {{CRITICAL|HIGH|MEDIUM|LOW}}

title: {{One-line summary}}

operation: {{What was being done}}
what_happened: {{What went wrong — facts only}}
root_cause: {{Why it went wrong}}
discovery: {{How it was discovered — immediately? hours later? next session?}}

tools_involved:
  - {{mcp__tool__name}}

what_caught_it: {{What actually caught the failure, or "nothing — discovered manually"}}
what_would_catch_it: {{What check/gate would have prevented this}}

# ---- downstream routing ----
# Per GUARD-003: an incident must be actionable in at least one of these three ways.
# An incident with none is a signal that the corpus is undercooked.

# Populate ONLY if StepProof runbooks exist in this project:
runbook_gate:
  runbook: {{rb-name or "N/A"}}
  step: {{step_id or "N/A"}}
  status: {{COVERED|GAP|N/A}}
  recommendation: {{If GAP: what gate to add; otherwise N/A}}

# Populated by /nightingale patterns — the Florence Nightingale systemic view.
# Cluster on thinking-patterns, not tools. Invent classes as needed.
pattern_class: {{e.g. "trust-before-verify" | "narrow-surface-mapping" | "shell-through-shell-quoting" | "declare-done-before-verify" | "cross-boundary-metadata-loss"}}

# Downstream encoders interested in this incident. Multiple OK.
consumers:
  - {{stepproof | forge-forge | skills | cockpit-mcp | ...}}

evidence:
  quotes: []
  log_lines: []
  error_messages: []
